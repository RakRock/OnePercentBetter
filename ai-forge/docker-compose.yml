services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiforge
      POSTGRES_PASSWORD: aiforge
      POSTGRES_DB: aiforge
    ports:
      - "5433:5432"
    volumes:
      - aiforge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - aiforge_qdrant:/qdrant/storage

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aiforge:aiforge@postgres:5432/aiforge
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  aiforge_pg:
  aiforge_qdrant:
